version: '3.8'

services:
  app:
    build: .
    container_name: tutorsonhenry-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - SESSION_SECRET=${SESSION_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
    depends_on:
      - mongo
    networks:
      - tutors-network
    restart: unless-stopped
    healthcheck:
      test: ["GET", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7.0-alpine
    container_name: tutorsonhenry-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-password}
      - MONGO_INITDB_DATABASE=tutorsonDB
    volumes:
      - mongo_data:/data/db
    networks:
      - tutors-network
    restart: unless-stopped

  # Optional: MongoDB Admin UI
  mongo-express:
    image: mongo-express:1.0.0
    container_name: tutorsonhenry-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD:-password}
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_MONGODB_DEFAULTDATABASE=tutorsonDB
    depends_on:
      - mongo
    networks:
      - tutors-network
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  tutors-network:
    driver: bridge
