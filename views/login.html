<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Tutorsonhenry</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0056b3',
                        accent: '#22a748',
                        surface: '#f6f8fb',
                        muted: '#6c757d',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        serif: ['Playfair Display', 'ui-serif', 'Georgia'],
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-surface font-sans text-gray-900">

    <!-- Header -->
    <header class="bg-white sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-4 flex items-center justify-between py-4">
            <div class="flex items-center gap-3">
                <a href="/">
                    <img src="{{ images.logo }}" alt="Tutorsonhenry Logo" class="h-12">
                </a>
                <a href="/">
                    <span class="text-primary font-bold text-lg">Tutorsonhenry</span>
                </a>

            </div>
        </div>
    </header>

    <!-- Login Card -->
    <main class="flex justify-center items-center min-h-screen p-4">
        <div class="bg-white shadow-lg rounded-xl p-10 w-full max-w-md">
            <h2 class="text-3xl font-bold text-center text-gray-900 mb-4">Welcome Back</h2>
            <p class="text-center text-muted mb-6">Login to your account</p>

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="block font-semibold mb-1">Email</label>
                    <input type="email" name="email" required
                        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                </div>

                <div>
                    <label class="block font-semibold mb-1">Password</label>
                    <input type="password" name="password" required
                        class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                </div>

                <button type="submit"
                    class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Login</button>
            </form>

            <p class="text-center mt-6 text-muted">
                Don’t have an account?
                <a href="/signup" class="text-accent font-semibold hover:underline">Sign Up</a>
            </p>
        </div>
    </main>

</body>

</html>
